<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>苹果</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'PingFang SC', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
  background: #1a1a1a;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
}

.phone {
  width: 390px; height: 844px; max-height: 100vh;
  background: #F5F0E8;
  overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,.4);
  position: relative;
}

/* ── 入口页 ── */
#entry-screen {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding: 40px 32px; gap: 32px;
  background: linear-gradient(180deg, #EFE8DA 0%, #F5F0E8 60%, #E8E0D3 100%);
  transition: opacity .4s, transform .4s;
}
#entry-screen.hidden {
  opacity:0; transform:translateY(-20px); pointer-events:none;
  position:absolute; top:0; left:0; right:0; bottom:0;
}
.entry-icon {
  font-size: 64px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.entry-question {
  font-family: 'Noto Serif SC', 'STSong', serif;
  font-size: 22px; font-weight: 600; color: #3d3226;
  text-align: center; line-height: 1.6;
  letter-spacing: 1px;
}
.entry-paths {
  display: flex; flex-direction: column; gap: 14px; width: 100%;
}
.path-btn {
  width: 100%; padding: 22px 20px;
  border-radius: 20px; border: 1.5px solid #d4c9b5;
  background: rgba(255,255,255,.6);
  font-size: 17px; color: #3d3226; cursor: pointer;
  transition: all .2s;
  display: flex; align-items: center; gap: 12px;
  font-family: inherit;
}
.path-btn:hover, .path-btn:active {
  background: #fff; border-color: #3d3226;
  transform: scale(1.01);
}
.path-emoji { font-size: 28px; flex-shrink: 0; }
.path-label { font-weight: 600; display:block; }
.path-hint { font-size: 13px; color: #8c7b6b; font-weight: 400; display:block; margin-top: 2px; }

/* ── 聊天页 ── */
#chat-screen {
  flex:1; display:none; flex-direction:column;
  overflow:hidden;
}
#chat-screen.active { display:flex; }

/* 顶栏 */
.chat-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px;
  background: #F5F0E8; border-bottom: 1px solid rgba(0,0,0,.05);
}
.chat-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: #E8DCC8; display:flex; align-items:center; justify-content:center;
  font-size: 20px; flex-shrink: 0;
}
.chat-header-info { flex:1; }
.chat-header-name { font-weight: 600; font-size: 15px; color: #3d3226; }
.chat-header-path { font-size: 11px; color: #b0a390; letter-spacing: 1px; }
.chat-reset { font-size: 12px; color: #b0a390; border:none; background:none; cursor:pointer; padding: 8px; }

/* 消息区 */
.messages {
  flex:1; overflow-y:auto; padding: 16px 18px;
  display:flex; flex-direction:column; gap: 14px;
}
.messages::-webkit-scrollbar { display:none; }

.msg-ai {
  align-self:flex-start; max-width:88%;
  display:flex; gap:8px;
}
.msg-ai-avatar {
  width: 30px; height: 30px; border-radius:50%;
  background:#E8DCC8; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size: 15px;
}
.msg-ai-text {
  background:#fff; padding:12px 16px;
  border-radius: 18px 18px 18px 4px;
  font-size:14px; line-height:1.7; color:#3d3226;
  white-space: pre-wrap; word-break: break-word;
}

.msg-user {
  align-self:flex-end; max-width:85%;
}
.msg-user-text {
  background:#3d3226; color:#F5F0E8;
  padding:12px 16px;
  border-radius: 18px 18px 4px 18px;
  font-size:14px; line-height:1.7;
  white-space: pre-wrap; word-break: break-word;
}

.msg-loading {
  align-self:flex-start; display:flex; gap:8px; align-items:center;
  padding: 4px 0;
}
.msg-loading-dots {
  display:flex; gap:4px;
}
.msg-loading-dots span {
  width:7px; height:7px; border-radius:50%;
  background:#c4b393;
  animation: dot 1.4s infinite;
}
.msg-loading-dots span:nth-child(2) { animation-delay:.2s; }
.msg-loading-dots span:nth-child(3) { animation-delay:.4s; }
@keyframes dot {
  0%,80%,100% { opacity:.3; transform:scale(.8); }
  40% { opacity:1; transform:scale(1); }
}

/* 输入栏 */
.input-bar {
  display:flex; gap:10px; align-items:center;
  padding: 12px 18px 16px;
  background:#F5F0E8; border-top:1px solid rgba(0,0,0,.04);
}
.input-bar textarea {
  flex:1; padding:12px 18px; border-radius:22px;
  border:1px solid #d4c9b5; font-size:14px; background:#fff; color:#3d3226;
  outline:none; resize:none; font-family:inherit;
  line-height:1.5; max-height:80px;
}
.input-bar textarea::placeholder { color:#c4b393; }
.send-btn {
  width: 42px; height: 42px; border-radius:50%;
  background:#3d3226; color:#F5F0E8; border:none;
  font-size:18px; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition: all .2s;
}
.send-btn:disabled { background:#c4b393; cursor:default; }
.send-btn:not(:disabled):active { transform:scale(.92); }

/* ── 响应式 ── */
@media (max-width: 420px) {
  .phone { width:100%; height:100vh; max-height:100vh; }
  body { align-items:stretch; }
}
</style>
</head>
<body>

<div class="phone" id="phone">

  <!-- ═══ 入口页 ═══ -->
  <div id="entry-screen">
    <div class="entry-icon">🍎</div>
    <div class="entry-question">你觉得拥有苹果时，<br>就只看这颗苹果吗？<br>还是期待葡萄、香蕉、梨？</div>
    <div class="entry-paths">
      <button class="path-btn" onclick="startChat('only-apple')">
        <span class="path-emoji">🍎</span>
        <span>
          <span class="path-label">只看苹果</span>
          <span class="path-hint">我有的，可能还没看见</span>
        </span>
      </button>
      <button class="path-btn" onclick="startChat('desire')">
        <span class="path-emoji">🍇</span>
        <span>
          <span class="path-label">期待其他水果</span>
          <span class="path-hint">有渴望，想往前走</span>
        </span>
      </button>
    </div>
  </div>

  <!-- ═══ 聊天页 ═══ -->
  <div id="chat-screen">
    <div class="chat-header">
      <div class="chat-avatar">🍎</div>
      <div class="chat-header-info">
        <div class="chat-header-name">苹果</div>
        <div class="chat-header-path" id="chat-header-path"></div>
      </div>
      <button class="chat-reset" onclick="resetChat()">重新开始</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-bar">
      <textarea id="userInput" rows="1" placeholder="说点什么..."
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>
  </div>

</div>

<script>
let currentPath = ''
let messages = []
let isLoading = false

const pathNames = {
  'only-apple': '只看苹果',
  'desire': '期待其他水果'
}

function startChat(path) {
  currentPath = path
  messages = []

  document.getElementById('entry-screen').classList.add('hidden')
  document.getElementById('chat-screen').classList.add('active')
  document.getElementById('chat-header-path').textContent = pathNames[path]
  document.getElementById('messages').innerHTML = ''
  document.getElementById('userInput').focus()

  sendFirstMessage()
}

function sendFirstMessage() {
  const greetings = {
    'only-apple': [
      '嘿，你来啦。\n\n今天不急着做什么。我们看看你手里已经有的那颗苹果——你平时可能顾不上看一眼的那颗。\n\n它是什么？',
      '晚上好。\n\n……其实我刚有点困，但你打开这个页面的时候，我还是想跟你说句话。\n\n告诉我，你最近有什么？什么都行，不用筛选。'
    ],
    'desire': [
      '来了。\n\n说吧——你现在有什么，还想要什么？不用不好意思。\n\n想要不是贪心，是你在往前的信号。',
      '嗯，我在。\n\n你刚才在入口那里停了一下对吧。期待其他水果——哪个水果最让你心跳？\n\n不用想太多，第一个冒出来的就是。'
    ]
  }

  const list = greetings[currentPath] || greetings['only-apple']
  const text = list[Math.floor(Math.random() * list.length)]

  addMessage('ai', text)
}

function addMessage(role, content) {
  messages.push({ role, content })
  renderMessages()
}

function renderMessages() {
  const container = document.getElementById('messages')
  let html = ''

  for (const msg of messages) {
    if (msg.role === 'ai') {
      html += `
        <div class="msg-ai">
          <div class="msg-ai-avatar">🍎</div>
          <div class="msg-ai-text">${escapeHtml(msg.content)}</div>
        </div>`
    } else {
      html += `
        <div class="msg-user">
          <div class="msg-user-text">${escapeHtml(msg.content)}</div>
        </div>`
    }
  }

  if (isLoading) {
    html += `
      <div class="msg-loading">
        <div class="msg-ai-avatar" style="width:30px;height:30px;font-size:15px;">🍎</div>
        <div class="msg-loading-dots">
          <span></span><span></span><span></span>
        </div>
      </div>`
  }

  container.innerHTML = html
  container.scrollTop = container.scrollHeight
}

async function sendMessage() {
  if (isLoading) return

  const input = document.getElementById('userInput')
  const text = input.value.trim()
  if (!text) return

  input.value = ''
  input.style.height = 'auto'
  document.getElementById('sendBtn').disabled = true

  addMessage('user', text)
  isLoading = true
  renderMessages()

  try {
    const apiMessages = messages
      .filter(m => m.role === 'user' || m.role === 'ai')
      .map(m => ({ role: m.role, content: m.content }))

    const recent = apiMessages.slice(-20)

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: recent,
        path: currentPath
      })
    })

    if (!res.ok) {
      const err = await res.json().catch(() => ({}))
      throw new Error(err.error || `请求失败 (${res.status})`)
    }

    const data = await res.json()
    addMessage('ai', data.content)
  } catch (err) {
    addMessage('ai', '……刚才走神了。再说一次？' + (err.message ? '\n\n（' + err.message + '）' : ''))
  } finally {
    isLoading = false
    document.getElementById('sendBtn').disabled = false
    renderMessages()
    document.getElementById('userInput').focus()
  }
}

function resetChat() {
  document.getElementById('entry-screen').classList.remove('hidden')
  document.getElementById('chat-screen').classList.remove('active')
  messages = []
  currentPath = ''
  document.getElementById('messages').innerHTML = ''
  document.getElementById('userInput').value = ''
  document.getElementById('sendBtn').disabled = false
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
}

document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto'
  this.style.height = Math.min(this.scrollHeight, 80) + 'px'
})
</script>

</body>
</html>
