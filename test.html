<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>苹果 - 连接测试</title>
<style>
body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; background: #F5F0E8; }
.messages { border: 1px solid #ccc; padding: 16px; min-height: 300px; margin-bottom: 16px; border-radius: 12px; background: #fff; }
.msg { margin-bottom: 12px; padding: 10px 14px; border-radius: 12px; max-width: 80%; }
.msg.ai { background: #E8DCC8; }
.msg.user { background: #3d3226; color: #fff; margin-left: auto; }
input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
button { margin-top: 8px; padding: 12px 24px; background: #3d3226; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
.status { font-size: 12px; color: #888; margin-top: 8px; }
</style>
</head>
<body>
<h2>🍎 苹果 - 连通性测试</h2>
<div class="messages" id="msgs"></div>
<input id="inp" placeholder="输入消息，点发送..." onkeydown="if(event.key==='Enter') send()">
<button onclick="send()">发送</button>
<div class="status" id="status">等待输入...</div>

<script>
const msgs = []
const inp = document.getElementById('inp')
const msgsEl = document.getElementById('msgs')
const statusEl = document.getElementById('status')

function render() {
  msgsEl.innerHTML = msgs.map(m =>
    `<div class="msg ${m.role}">${m.content.replace(/</g,'&lt;')}</div>`
  ).join('')
}

async function send() {
  const text = inp.value.trim()
  if (!text) return
  inp.value = ''
  msgs.push({ role: 'user', content: text })
  render()
  statusEl.textContent = '发送中...'

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: msgs.map(m => ({ role: m.role === 'ai' ? 'assistant' : m.role, content: m.content })),
        path: 'only-apple'
      })
    })
    const data = await res.json()
    if (data.content) {
      msgs.push({ role: 'ai', content: data.content })
      statusEl.textContent = '成功收到回复'
    } else {
      msgs.push({ role: 'ai', content: '空回复: ' + JSON.stringify(data) })
      statusEl.textContent = '收到空回复'
    }
  } catch(e) {
    msgs.push({ role: 'ai', content: '错误: ' + e.message })
    statusEl.textContent = '错误: ' + e.message
  }
  render()
}
</script>
</body>
</html>
